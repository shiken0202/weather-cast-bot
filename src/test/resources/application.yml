spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

api:
  cwa:
    key: mock
  gemini:
    key: mock

line:
  bot:
    channel-token: mock-token
    channel-secret: mock-secret
    handler:
      path: /callback

discord:
  bot:
    token: mock-token
